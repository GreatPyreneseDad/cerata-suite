<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>🪸 Cerata Panel</title>
<style>
:root{
  --bg:#0e1014; --panel:#171a21; --panel2:#1e222c; --line:#2a2f3a;
  --ink:#e7e9ee; --dim:#9aa3b2; --faint:#6b7280;
  --rose:#ff7a8a; --rose2:#ff9aa6; --teal:#56d3c2; --gold:#e8c468; --violet:#9a8cff;
  --good:#5ad19a; --warn:#e8a36a;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
a{color:var(--rose2);text-decoration:none}
.wrap{display:grid;grid-template-columns:300px 1fr;min-height:100vh}
.side{background:var(--panel);border-right:1px solid var(--line);padding:18px 16px;position:sticky;top:0;height:100vh;overflow:auto}
.main{padding:24px 30px;overflow:auto;max-height:100vh}
h1{font-size:18px;margin:0 0 2px;letter-spacing:.2px}
.sub{color:var(--dim);font-size:12px;margin-bottom:16px}
.caveat{background:#2a1d22;border:1px solid #4a2c34;color:#ffd0d6;font-size:11.5px;padding:8px 10px;border-radius:8px;margin-bottom:16px}
.search{width:100%;padding:10px 12px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--ink);font-size:14px}
.search:focus{outline:none;border-color:var(--rose)}
.results{margin-top:6px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;max-height:300px;overflow:auto;display:none}
.results.open{display:block}
.r-item{padding:8px 11px;cursor:pointer;border-bottom:1px solid var(--line);font-size:13px;display:flex;gap:8px;align-items:center}
.r-item:hover{background:#252a35}
.r-item:last-child{border-bottom:none}
.pill{font-size:10px;padding:1px 6px;border-radius:20px;border:1px solid var(--line);color:var(--dim);flex:none}
.pill.person{color:var(--teal);border-color:#2c4a46}
.pill.class{color:var(--gold);border-color:#4a432c}
.stat-row{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}
.stat{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:8px 10px;flex:1;min-width:80px}
.stat b{display:block;font-size:18px}.stat span{color:var(--dim);font-size:10.5px;text-transform:uppercase;letter-spacing:.4px}
.sec-title{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);margin:18px 0 8px}
.cohort-chip{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-bottom:7px;cursor:pointer;color:var(--ink)}
.cohort-chip:hover{border-color:var(--rose)}
.cohort-chip b{font-size:13px}.cohort-chip .meta{color:var(--dim);font-size:11px;margin-top:2px}
.dot{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:6px;vertical-align:middle}
.sources{font-size:11px;color:var(--dim);margin-top:18px;border-top:1px solid var(--line);padding-top:12px}
.sources div{margin:3px 0}
.ok{color:var(--good)} .pend{color:var(--faint)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin-bottom:18px}
.read-head{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap}
.read-head h2{margin:0;font-size:22px}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--line);color:var(--dim)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{font-size:11.5px;padding:3px 9px;border-radius:20px;background:var(--panel2);border:1px solid var(--line);color:var(--dim)}
.chip.k{color:var(--rose2);border-color:#4a2c34}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:820px){.wrap{grid-template-columns:1fr}.side{position:static;height:auto}.grid2{grid-template-columns:1fr}}
.block h3{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);margin:0 0 8px}
.list{list-style:none;margin:0;padding:0}
.list li{padding:5px 0;border-bottom:1px solid var(--line);font-size:13px;display:flex;justify-content:space-between;gap:10px}
.list li:last-child{border-bottom:none}
.num{color:var(--gold);font-variant-numeric:tabular-nums;flex:none}
.bar{height:10px;border-radius:6px;background:var(--panel2);overflow:hidden;display:flex;margin:4px 0}
.bar i{display:block;height:100%}
.gauge{margin:8px 0}
.gauge .lab{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:3px}
.gauge .track{height:8px;background:var(--panel2);border-radius:5px;overflow:hidden}
.gauge .fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--gold))}
.muted{color:var(--faint);font-size:12px}
.pred li .num{color:var(--teal)}
.tag-people{display:flex;flex-wrap:wrap;gap:6px}
.person-tag{font-size:12px;padding:3px 9px;border-radius:20px;background:var(--panel2);border:1px solid var(--line);cursor:pointer}
.person-tag:hover{border-color:var(--teal);color:var(--teal)}
.click{cursor:pointer}
.hint{color:var(--faint);font-size:12.5px}
.cohort-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px}
.cohort-legend span{font-size:11px;color:var(--dim)}
kbd{background:var(--panel2);border:1px solid var(--line);border-radius:4px;padding:0 5px;font-size:11px}
.tabs{display:flex;gap:6px;margin:12px 0 2px}
.tab{flex:1;padding:7px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--dim);cursor:pointer;font-size:12.5px}
.tab.active{color:var(--ink);border-color:var(--rose);background:#241a1e}
.mkt-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.mkt-head h2{margin:0;font-size:22px}
.selfpick{background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--ink);padding:6px 8px;font-size:13px;max-width:240px}
.slot{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:12px}
.slot-time{font-size:12px;color:var(--gold);font-variant-numeric:tabular-nums;margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px}
.bidrow{display:flex;align-items:center;gap:10px;padding:6px 0;cursor:pointer}
.bidrow .nm{flex:1;font-size:13px;min-width:0}
.bidrow .track2{height:7px;border-radius:5px;background:var(--panel2);overflow:hidden;width:150px;flex:none}
.bidrow .fill2{height:100%;background:linear-gradient(90deg,var(--teal),var(--gold))}
.bidrow .pct{width:34px;text-align:right;font-variant-numeric:tabular-nums;color:var(--dim);font-size:12px;flex:none}
.win{color:var(--good);font-weight:600}
.wintag{font-size:9.5px;color:var(--good);border:1px solid #2c4a3a;border-radius:20px;padding:1px 6px;margin-left:4px}
.oc{font-size:11px;color:var(--faint);margin-top:8px;border-top:1px solid var(--line);padding-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <aside class="side">
    <h1>🪸 Cerata Panel</h1>
    <div class="sub">revealed-preference reads · Edge Esmeralda</div>
    <div class="caveat" id="caveat">…</div>
    <input class="search" id="search" placeholder="Load a class or person…" autocomplete="off"/>
    <div class="results" id="results"></div>
    <div class="tabs">
      <button class="tab active" data-tab="reads">Reads</button>
      <button class="tab" data-tab="market">Attention&nbsp;Market</button>
    </div>
    <div class="stat-row" id="stats"></div>
    <div class="sec-title">Cohorts</div>
    <div id="cohortNav"></div>
    <div class="sources">
      <div class="sec-title" style="margin-top:0">Plugin data</div>
      <div><span class="ok">●</span> cerata-cohort &nbsp;<span class="muted">attendance · loaded</span></div>
      <div><span class="pend">○</span> cerata-surface <span class="muted">decision-surface · load surface-data.js</span></div>
      <div><span class="pend">○</span> cerata-reflect <span class="muted">negotiations · load reflect-data.js</span></div>
      <div><span class="pend">○</span> cerata-weave <span class="muted">λ tables · load weave-data.js</span></div>
    </div>
  </aside>
  <main class="main" id="main"></main>
</div>

<script src="forecast-data.js"></script>
<script>
const F = window.FORECAST || {meta:{},cohorts:[],classes:[],people:[]};
const COLORS = ["#ff7a8a","#56d3c2","#e8c468","#9a8cff","#5ad19a","#f08a5d","#7aa2ff","#d36ad3"];
const cohortColor = i => COLORS[i % COLORS.length];

// index maps -> we reference everything by integer index (no string-in-onclick quoting bugs)
const PIDX={}, CIDX={};
F.people.forEach((p,i)=>{ PIDX[p.name.toLowerCase()]=i; });
F.classes.forEach((c,i)=>{ if(c.title) CIDX[c.title.toLowerCase()]=i; });
const pIdx = nm => nm!=null && PIDX[(""+nm).toLowerCase()]!=null ? PIDX[(""+nm).toLowerCase()] : -1;
const cIdx = ti => ti!=null && CIDX[(""+ti).toLowerCase()]!=null ? CIDX[(""+ti).toLowerCase()] : -1;

function esc(s){return (s==null?"":""+s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));}

// ---------- sidebar ----------
function chrome(){
  const m=F.meta;
  document.getElementById("caveat").innerHTML = "⚠ "+esc(m.note||"RSVP-based.");
  document.getElementById("stats").innerHTML =
    [["people",m.people],["classes",m.classes],["cohorts",m.cohorts],
     ["modularity",m.modularity],["check-in",((m.checkin_coverage||0)*100).toFixed(1)+"%"]]
    .map(([l,v])=>`<div class="stat"><b>${esc(v)}</b><span>${l}</span></div>`).join("");
  document.getElementById("cohortNav").innerHTML = F.cohorts.map(c=>
    `<button class="cohort-chip" data-co="${c.id}">
       <b><span class="dot" style="background:${cohortColor(c.id)}"></span>${esc(c.label||("cohort "+c.id))}</b>
       <div class="meta">${c.size} people · ${esc((c.tracks[0]||['—'])[0])}</div>
     </button>`).join("");
}

// ---------- search ----------
const sEl=document.getElementById("search"), rEl=document.getElementById("results");
sEl.addEventListener("input",()=>{
  const q=sEl.value.trim().toLowerCase();
  if(!q){rEl.classList.remove("open");return;}
  const pp=F.people.filter(p=>p.name.toLowerCase().includes(q)).slice(0,6)
    .map(p=>({t:"person",label:p.name,sub:p.n_classes+" classes",idx:pIdx(p.name)}));
  const cc=F.classes.filter(c=>c.title&&c.title.toLowerCase().includes(q)).slice(0,6)
    .map(c=>({t:"class",label:c.title,sub:c.attendee_count+" RSVPs",idx:cIdx(c.title)}));
  const all=[...pp,...cc].slice(0,10);
  rEl.innerHTML = all.length? all.map(x=>
    `<div class="r-item" data-${x.t==="person"?"pi":"ci"}="${x.idx}">
       <span class="pill ${x.t}">${x.t}</span><span>${esc(x.label)}</span>
       <span style="margin-left:auto;color:var(--faint);font-size:11px">${esc(x.sub)}</span></div>`).join("")
    : `<div class="r-item muted">no match</div>`;
  rEl.classList.add("open");
});

// ---------- one delegated click handler (data-pi / data-ci / data-co) ----------
document.addEventListener("click",e=>{
  const tab=e.target.closest("[data-tab]");
  if(tab){ tab.dataset.tab==="market" ? renderMarket() : overview(); return; }
  const t=e.target.closest("[data-pi],[data-ci],[data-co]");
  if(t){
    if(t.dataset.pi!=null){ const i=+t.dataset.pi; if(i>=0) showPerson(F.people[i]); }
    else if(t.dataset.ci!=null){ const i=+t.dataset.ci; if(i>=0) showClass(F.classes[i]); }
    else if(t.dataset.co!=null){ showCohort(+t.dataset.co); }
    rEl.classList.remove("open"); sEl.value="";
    return;
  }
  if(!e.target.closest(".side")) rEl.classList.remove("open");
});

// helpers
const chips = arr => (arr&&arr.length)? arr.map(([t,n])=>`<span class="chip">${esc(t)} <span class="num">${n}</span></span>`).join("") : '<span class="muted">—</span>';
const peopleTags = names => names&&names.length ? names.map(n=>`<span class="person-tag" data-pi="${pIdx(n)}">${esc(n)}</span>`).join("") : '<span class="muted">—</span>';

function setActiveTab(name){
  document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active", b.dataset.tab===name));
}

// ---------- attention market (allocation) ----------
const M = F.market || {upcoming:[], cohort_aff:{}, now:""};
let currentSelf = (()=>{ let i=F.people.findIndex(p=>p.name==="Christopher MacGregor" && p.cohort_id!=null);
  return i>=0? i : F.people.findIndex(p=>p.cohort_id!=null); })();
function affScore(self, cls){
  const ci=self.cohort_id; if(ci==null) return 0;
  const A=(M.cohort_aff||{})[ci]||{track:{},host:{},tag:{}};
  const tr=(A.track||{})[cls.track]||0, ho=(A.host||{})[cls.host]||0;
  const tags=cls.tags||[]; const tg=tags.length? tags.reduce((s,t)=>s+((A.tag||{})[t]||0),0)/tags.length : 0;
  return 0.45*tr + 0.30*ho + 0.25*tg;
}
function fmtTime(iso){ try{ return new Date(iso).toLocaleString([], {weekday:'short',hour:'numeric',minute:'2-digit'}); }catch(e){ return (iso||'').slice(0,16); } }
function bindSelf(){ const s=document.getElementById("selfPick"); if(s) s.onchange=()=>{ currentSelf=+s.value; renderMarket(); }; }
function renderMarket(){
  setActiveTab("market");
  const self=F.people[currentSelf];
  location.hash="market="+encodeURIComponent(self?self.name:"");
  const clustered=F.people.map((p,i)=>[p,i]).filter(([p])=>p.cohort_id!=null)
    .sort((a,b)=>a[0].name.localeCompare(b[0].name));
  const opts=clustered.map(([p,i])=>`<option value="${i}" ${i===currentSelf?"selected":""}>${esc(p.name)}</option>`).join("");
  const head=`<div class="mkt-head"><h2>Attention Market</h2><span class="muted">forecasting for</span>
       <select class="selfpick" id="selfPick">${opts}</select></div>`;
  if(!self || self.cohort_id==null){
    document.getElementById("main").innerHTML=`<div class="card">${head}
      <p class="muted">Pick a person with a stable cohort — the market prices attention from cohort affinity.</p></div>`;
    bindSelf(); return;
  }
  const attended=new Set((self.classes||[]).map(t=>(t||"").toLowerCase()));
  const scored=(M.upcoming||[]).filter(c=>c.start && !attended.has((c.title||"").toLowerCase()))
    .map(c=>({c, s:affScore(self,c)}));
  let maxS=1e-4; scored.forEach(x=>{ if(x.s>maxS) maxS=x.s; });
  const pct=s=>Math.round(s/maxS*100);
  const slots={}; scored.forEach(x=>{ (slots[x.c.start]=slots[x.c.start]||[]).push(x); });
  const comp=Object.entries(slots).filter(([,v])=>v.length>=2).sort((a,b)=>a[0]<b[0]?-1:1);
  comp.forEach(([,v])=>v.sort((a,b)=>b.s-a.s));
  const sched=comp.map(([k,v])=>({t:k,w:v[0]})).slice(0,14);
  document.getElementById("main").innerHTML=`
   <div class="card">${head}
     <p class="hint">Your attention is finite. Each time-slot is a market — competing classes <b>bid</b> with their
       predicted enjoyment for <b>${esc(self.name)}</b> (from <b>${esc((F.cohorts[self.cohort_id]||{}).label)}</b>).
       The market clears to the highest bid; the <b>opportunity cost</b> is what you give up elsewhere.
       Bids are cohort affinity (0–100, relative); settles on reattendance.</p>
   </div>
   <div class="card">
     <h3 style="margin-top:0">Optimal attention schedule <span class="muted">· ${comp.length} contested slots</span></h3>
     <ul class="list">${sched.map(x=>`<li><span class="click win" data-ci="${cIdx(x.w.c.title)}">${esc(x.w.c.title)}</span>
        <span class="num">${fmtTime(x.t)} · ${pct(x.w.s)}</span></li>`).join("")||'<li class="muted">no contested upcoming slots in the published calendar</li>'}</ul>
   </div>
   ${comp.map(([k,v])=>{
     const oc=v.length>1? pct(v[0].s)-pct(v[1].s) : pct(v[0].s);
     return `<div class="slot"><div class="slot-time">${fmtTime(k)}</div>
       ${v.map((x,i)=>`<div class="bidrow" data-ci="${cIdx(x.c.title)}">
          <span class="nm ${i===0?'win':''}">${esc(x.c.title)}${i===0?'<span class="wintag">attention</span>':''}
             <span class="muted">· ${esc(x.c.track||x.c.host||'')}</span></span>
          <span class="track2"><span class="fill2" style="width:${pct(x.s)}%"></span></span>
          <span class="pct">${pct(x.s)}</span></div>`).join("")}
       <div class="oc">cost of skipping the top pick here: <b>${oc}</b> enjoyment-pts</div></div>`;
   }).join("")}`;
  bindSelf();
  window.scrollTo(0,0);
}

// ---------- reads ----------
function showPerson(p){
  setActiveTab("reads");
  if(!p)return;
  location.hash="person="+encodeURIComponent(p.name);
  const ci=p.cohort_id, coh = ci!=null? F.cohorts[ci] : null, sig=p.signature;
  document.getElementById("main").innerHTML = `
   <div class="card">
     <div class="read-head">
       <h2>${esc(p.name)}</h2>
       ${coh?`<span class="badge" style="border-color:${cohortColor(ci)};color:${cohortColor(ci)}">
          <span class="dot" style="background:${cohortColor(ci)}"></span>${esc(coh.label)}</span>`
         :`<span class="badge">no stable cohort · communal-only</span>`}
       <span class="badge">${p.n_classes} classes</span>
     </div>
     <div class="chips">${chips(sig.tags)}</div>
     <div class="grid2" style="margin-top:18px">
       <div class="block">
         <h3>Predicted next classes ${coh?'':'<span class="muted">(needs cohort)</span>'}</h3>
         <ul class="list pred">${(p.predicted_classes||[]).map(([ti,n])=>
            `<li><span class="click" data-ci="${cIdx(ti)}">${esc(ti)}</span><span class="num">${n} peers</span></li>`).join("")||'<li class="muted">—</li>'}</ul>
         <div class="hint" style="margin-top:6px">classes their cohort attends that they haven't — ranked by cohort-mates going.</div>
       </div>
       <div class="block">
         <h3>Strongest co-attendees</h3>
         <div class="tag-people">${peopleTags((p.co_attendees||[]).map(([n])=>n))}</div>
         <h3 style="margin-top:16px">Signature</h3>
         <div class="chips">${chips(sig.tracks)}</div>
         <div class="chips" style="margin-top:6px">${chips(sig.hosts)}</div>
       </div>
     </div>
     <div class="block" style="margin-top:6px">
       <h3>Classes attended (${p.classes.length})</h3>
       <div class="chips">${p.classes.map(ti=>`<span class="chip click" data-ci="${cIdx(ti)}">${esc(ti)}</span>`).join("")}</div>
     </div>
   </div>`;
  window.scrollTo(0,0);
}

function showClass(c){
  setActiveTab("reads");
  if(!c)return;
  location.hash="class="+encodeURIComponent(c.title);
  const mix=c.cohort_mix||[]; const total=mix.reduce((a,[,n])=>a+n,0)||1;
  const mixbar = mix.map(([ci,n])=>`<i style="width:${n/total*100}%;background:${cohortColor(ci)}" title="${esc((F.cohorts[ci]||{}).label)}: ${n}"></i>`).join("");
  const enj=c.enjoyment||{};
  const gauge=(lab,v)=> v==null?`<div class="gauge"><div class="lab"><span>${lab}</span><span class="muted">n/a</span></div></div>`
    :`<div class="gauge"><div class="lab"><span>${lab}</span><span>${(v*100).toFixed(0)}%</span></div>
        <div class="track"><div class="fill" style="width:${v*100}%"></div></div></div>`;
  document.getElementById("main").innerHTML = `
   <div class="card">
     <div class="read-head">
       <h2>${esc(c.title)}</h2>
       <span class="badge">${c.attendee_count} RSVPs</span>
       ${c.track?`<span class="badge">${esc(c.track)}</span>`:''}
       ${c.host?`<span class="badge">host · ${esc(c.host)}</span>`:''}
     </div>
     <div class="chips">${(c.tags||[]).map(t=>`<span class="chip k">${esc(t)}</span>`).join("")}</div>
     <div class="grid2" style="margin-top:18px">
       <div class="block">
         <h3>Cohort mix (who shows up)</h3>
         <div class="bar">${mixbar||'<i style="width:100%;background:var(--panel2)"></i>'}</div>
         <div class="cohort-legend">${mix.map(([ci,n])=>
            `<span class="click" data-co="${ci}"><span class="dot" style="background:${cohortColor(ci)}"></span>${esc((F.cohorts[ci]||{label:'unclustered'}).label)} · ${n}</span>`).join("")||'<span class="muted">no clustered attendees</span>'}</div>
         <h3 style="margin-top:16px">Enjoyment proxy <span class="muted">(reattendance, RSVP-based)</span></h3>
         ${gauge("Attendees returned to this host", enj.host_return)}
         ${gauge("Attendees returned to this track", enj.track_return)}
         <div class="hint">did the room come back to the same host / track elsewhere — the etiquette-proof signal. Not confirmed presence (check-in ~0.2%).</div>
       </div>
       <div class="block">
         <h3>RSVP'd (${c.attendees.length} named)</h3>
         <div class="tag-people">${peopleTags(c.attendees)}</div>
       </div>
     </div>
   </div>`;
  window.scrollTo(0,0);
}

function showCohort(i){
  setActiveTab("reads");
  const c=F.cohorts[i]; if(!c)return;
  location.hash="cohort="+i;
  document.getElementById("main").innerHTML=`
   <div class="card">
     <div class="read-head">
       <h2><span class="dot" style="background:${cohortColor(i)};width:14px;height:14px"></span>${esc(c.label)}</h2>
       <span class="badge">${c.size} people</span>
     </div>
     <div class="grid2" style="margin-top:18px">
       <div class="block"><h3>Binds them</h3>
         <div class="chips">${chips(c.tags)}</div>
         <div class="chips" style="margin-top:6px">${chips(c.tracks)}</div>
         <div class="chips" style="margin-top:6px">${chips(c.hosts)}</div></div>
       <div class="block"><h3>Signature classes</h3>
         <div class="chips">${c.signature_classes.map(ti=>`<span class="chip click" data-ci="${cIdx(ti)}">${esc(ti)}</span>`).join("")}</div></div>
     </div>
     <div class="block" style="margin-top:6px"><h3>Members</h3>
       <div class="tag-people">${peopleTags(c.members)}</div></div>
   </div>`;
  window.scrollTo(0,0);
}

function overview(){
  setActiveTab("reads");
  const top=[...F.classes].sort((a,b)=>b.attendee_count-a.attendee_count).slice(0,10);
  document.getElementById("main").innerHTML=`
   <div class="card">
     <div class="read-head"><h2>Reads</h2></div>
     <p class="hint">Type a <b>class</b> or <b>person</b> in the search to pull their read — or open this panel with
        <kbd>#person=Name</kbd> / <kbd>#class=Title</kbd> and the agent lands you straight on it.
        Click any cohort, attendee, class, or co-attendee to jump.</p>
     <div class="grid2" style="margin-top:8px">
       <div class="block"><h3>Cohorts (${F.cohorts.length}) · modularity ${F.meta.modularity}</h3>
         <ul class="list">${F.cohorts.map(c=>
            `<li><span class="click" data-co="${c.id}"><span class="dot" style="background:${cohortColor(c.id)}"></span>${esc(c.label)}</span><span class="num">${c.size}</span></li>`).join("")}</ul></div>
       <div class="block"><h3>Most-subscribed classes</h3>
         <ul class="list">${top.map(c=>
            `<li><span class="click" data-ci="${cIdx(c.title)}">${esc(c.title)}</span><span class="num">${c.attendee_count}</span></li>`).join("")}</ul></div>
     </div>
   </div>`;
}

function route(){
  const h=decodeURIComponent(location.hash.replace(/^#/,""));
  if(h.startsWith("person=")){ const i=pIdx(h.slice(7)); return i>=0?showPerson(F.people[i]):overview(); }
  if(h.startsWith("class=")){ const i=cIdx(h.slice(6)); return i>=0?showClass(F.classes[i]):overview(); }
  if(h.startsWith("cohort=")) return showCohort(+h.slice(7));
  if(h==="market" || h.startsWith("market=")){
    if(h.startsWith("market=")){ const i=pIdx(h.slice(7)); if(i>=0) currentSelf=i; }
    return renderMarket();
  }
  overview();
}
chrome(); route();
window.addEventListener("hashchange",route);
</script>
</body>
</html>
